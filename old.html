<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>odesseu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {font-family: 'Cabinet Grotesk', sans-serif;background: #0a0a0a; color: #fff;-webkit-font-smoothing: antialiased;}
.video-bg {position: fixed; inset: 0; z-index: 0; overflow: hidden;}
.video-bg video {width: 100%; height: 100%; object-fit: cover; opacity: 0.55;}
.video-bg::after {content: '';position: absolute; inset: 0;background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.5) 100%);}
.grain {position: fixed; inset: 0; z-index: 1; pointer-events: none;background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity: 0.04;}
.ui {position: fixed; inset: 0; z-index: 10;padding: 28px 32px;display: flex; flex-direction: column; gap: 14px;align-items: flex-start;}
.glass {background: rgba(255,255,255,0.07);backdrop-filter: blur(28px) saturate(1.8) brightness(1.05);-webkit-backdrop-filter: blur(28px) saturate(1.8) brightness(1.05);border: 1px solid rgba(255,255,255,0.14);box-shadow:0 8px 32px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.14),inset 0 -1px 0 rgba(0,0,0,0.08);}
.status-card {border-radius: 18px;padding: 10px 14px;display: flex; align-items: center;gap: 11px;width: fit-content; max-width: 450px;animation: fadeDown 0.6s cubic-bezier(0.16,1,0.3,1) both;overflow: hidden;}
@keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to   { opacity: 1; transform: none; }}
.av-wrap { position: relative; flex-shrink: 0;width: 38px;height: 38px;display: flex;align-items: center;justify-content: center;}
.av-wrap img, .av-ph {width: 38px; height: 38px; border-radius: 50%;object-fit: cover; display: block;}
.av-ph {background: linear-gradient(135deg, #421f4a, #7a3d88);display: flex; align-items: center; justify-content: center;font-size: 16px; font-weight: 800; color: #fff;}
.s-dot {position: absolute; bottom: 0; right: 0;width: 11px; height: 11px; border-radius: 50%;border: 2px solid rgba(15,15,15,0.7);}
.s-dot.online  { background: #23a55a; }
.s-dot.idle    { background: #f0b232; }
.s-dot.dnd     { background: #f23f43; }
.s-dot.offline { background: #80848e; }
.s-info { flex: 1; min-width: 0; display: flex;flex-direction: column;justify-content: center; /* Центрирует текст внутри относительно аватарки */}
.s-name {font-size: 13px; font-weight: 700; color: #fff;line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.s-act {display: flex; align-items: center; gap: 5px; margin-top: 3px;}
.act-icon { width: 13px; height: 13px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.act-txt {font-size: 10px; font-family: 'DM Mono', monospace;color: rgba(255,255,255,0.45);white-space: nowrap; overflow: hidden; text-overflow: ellipsis;display: block;}
.site-nav {border-radius: 18px;padding: 5px;width: fit-content;position: relative;animation: fadeDown 0.65s 0.08s cubic-bezier(0.16,1,0.3,1) both;}
.nav-hl {position: absolute;border-radius: 13px;background: rgba(255,255,255,0.1);border: 1px solid rgba(255,255,255,0.16);pointer-events: none;z-index: 0;opacity: 0;transition: top 0.22s cubic-bezier(0.16,1,0.3,1), left 0.22s cubic-bezier(0.16,1,0.3,1), width 0.22s cubic-bezier(0.16,1,0.3,1), height 0.22s cubic-bezier(0.16,1,0.3,1), opacity 0.18s ease, transform 0.3s cubic-bezier(0.4,0,1,1);}
.nav-item {position: relative; z-index: 1;display: flex; align-items: center; gap: 10px;padding: 8px 12px;border-radius: 13px;cursor: pointer; text-decoration: none;color: rgba(255,255,255,0.6);transition: color 0.18s ease;user-select: none;}
.nav-item:hover { color: #fff; }
.nav-icon {width: 30px; height: 30px; border-radius: 9px;background: rgba(255,255,255,0.09);border: 1px solid rgba(255,255,255,0.1);display: flex; align-items: center; justify-content: center;font-size: 15px; flex-shrink: 0;transition: background 0.18s, border-color 0.18s;}
.nav-item:hover .nav-icon {background: rgba(255,255,255,0.15);border-color: rgba(255,255,255,0.2);}
.nav-texts { display: flex; flex-direction: column; gap: 1px; }
.nav-name  { font-size: 13px; font-weight: 600; line-height: 1.2; }
.nav-desc  { font-size: 10px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.38); line-height: 1.2; }
.main-title {position: fixed; bottom: 30px; left: 32px; z-index: 10;animation: fadeUp 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to   { opacity: 1; transform: none; }}
.main-title h1 {font-family: 'Instrument Serif', serif;font-size: clamp(38px, 5vw, 62px);font-weight: 400; line-height: 1; letter-spacing: -0.01em;color: #fff;text-shadow: 0 2px 24px rgba(0,0,0,0.45);}
.main-title h1 em { font-style: italic; color: rgba(255,255,255,0.55); }
.main-title-sub {font-family: 'DM Mono', monospace;font-size: 11px; color: rgba(255,255,255,0.3);letter-spacing: 0.12em; text-transform: uppercase; margin-top: 5px;}
</style>
</head>
<body>
<div class="video-bg">
  <video autoplay muted loop playsinline src="bg.mp4"></video>
</div>
<div class="grain"></div>
<div class="ui">
  <div class="status-card glass" id="status-card">
    <div class="av-wrap">
      <div class="av-ph" id="av-ph">o</div>
      <img id="av-img" src="" alt="" style="display:none;position:absolute;inset:0;width:38px;height:38px;border-radius:50%">
      <div class="s-dot offline" id="s-dot"></div>
    </div>
    <div class="s-info">
      <div class="s-name" id="s-name">odesseu</div>
      <div class="s-act" id="s-act">
        <span class="act-txt">connecting...</span>
      </div>
    </div>
  </div>
  <div class="site-nav glass" id="site-nav">
    <div class="nav-hl" id="nav-hl"></div>

    <a class="nav-item" href="https://makito.pages.dev/" id="ni-1">
      <div class="nav-icon">M</div>
      <div class="nav-texts">
        <div class="nav-name">Makito</div>
        <div class="nav-desc">makito.pages.dev</div>
      </div>
    </a>

    <a class="nav-item" href="https://odesseu.github.io/softworks/" id="ni-0">
      <div class="nav-icon">S</div>
      <div class="nav-texts">
        <div class="nav-name">O-S Software</div>
        <div class="nav-desc">odesseu.github.io/softworks</div>
      </div>
    </a>


  </div>
</div>
<div class="main-title">
  <h1>odesseu<em>.</em></h1>
  <div class="main-title-sub"></div>
</div>
<script>
const DISCORD_ID = '1048169367935926283';
function lanyardConnect() { const ws = new WebSocket('wss://api.lanyard.rest/socket'); let heartbeat; ws.onopen = () => { ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } })); }; ws.onmessage = e => { const msg = JSON.parse(e.data); if (msg.op === 1) { heartbeat = setInterval(() => ws.readyState === 1 && ws.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval); } if (msg.op === 0 && (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE')) { applyPresence(msg.d); } }; ws.onclose = () => { clearInterval(heartbeat); setTimeout(lanyardConnect, 3000); };}
function applyPresence(data) { const dot   = document.getElementById('s-dot'); const name  = document.getElementById('s-name'); const act   = document.getElementById('s-act'); const avImg = document.getElementById('av-img'); const avPh  = document.getElementById('av-ph'); const st = data.discord_status || 'offline'; dot.className = 's-dot ' + st; name.textContent = data.discord_user?.global_name || data.discord_user?.username || 'odesseu'; if (data.discord_user?.avatar) { avImg.src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=80`; avImg.style.display = 'block'; avPh.style.display = 'none'; } act.innerHTML = ''; const activity = data.activities?.find(a => a.type !== 4); const custom   = data.activities?.find(a => a.type === 4);
if (activity) { if (activity.application_id && activity.assets?.large_image) {const ico = document.createElement('img');ico.className = 'act-icon';ico.crossOrigin = "anonymous";if (activity.assets.large_image_url) {ico.src = activity.assets.large_image_url;} else if (activity.assets.large_image.startsWith('mp:external')) { const parts = activity.assets.large_image.split('https/'); if (parts.length > 1) {ico.src = 'https://' + parts[1];} else {ico.src = `https://cdn.discordapp.com/app-icons/${activity.application_id}/${activity.assets.large_image}.png?size=32`;} } else {ico.src = `https://cdn.discordapp.com/app-icons/${activity.application_id}/${activity.assets.large_image}.webp?size=32`;}ico.onerror = () => {console.log("Иконка не загрузилась (404), удаляем её из DOM");ico.remove();};act.appendChild(ico);}const txt = document.createElement('span'); txt.className = 'act-txt'; txt.textContent = activity.name + (activity.details ? ' — ' + activity.details : ''); act.appendChild(txt); } else if (custom?.state) { const txt = document.createElement('span'); txt.className = 'act-txt'; txt.textContent = (custom.emoji?.name ? custom.emoji.name + ' ' : '') + custom.state; act.appendChild(txt); } else { const txt = document.createElement('span'); txt.className = 'act-txt'; txt.textContent = st === 'offline' ? 'offline' : 'no activity'; act.appendChild(txt); } }
if (DISCORD_ID !== '') { lanyardConnect(); } else {document.getElementById('s-act').innerHTML = '<span class="act-txt">вставь Discord User ID в код</span>';}
const navEl  = document.getElementById('site-nav');
const hl     = document.getElementById('nav-hl');
const navItems = navEl.querySelectorAll('.nav-item');
let active = null;
let leaveTimer = null;
function placeHl(el, animate) { const nr = navEl.getBoundingClientRect(); const er = el.getBoundingClientRect(); if (!animate) { hl.style.transition = 'none'; requestAnimationFrame(() => hl.style.transition = ''); } hl.style.opacity = '1'; hl.style.transform = ''; hl.style.top    = (er.top  - nr.top)  + 'px'; hl.style.left   = (er.left - nr.left) + 'px'; hl.style.width  = er.width  + 'px'; hl.style.height = er.height + 'px';}
navItems.forEach(item => { item.addEventListener('mouseenter', () => { clearTimeout(leaveTimer); placeHl(item, active !== null); active = item; }); });
navEl.addEventListener('mouseleave', e => { leaveTimer = setTimeout(() => { if (!active) return; const nr = navEl.getBoundingClientRect(); const cx = nr.left + nr.width  / 2; const cy = nr.top  + nr.height / 2; const dx = e.clientX - cx; const dy = e.clientY - cy; const norm = Math.sqrt(dx*dx + dy*dy) || 1; const tx = (dx / norm) * 28; const ty = (dy / norm) * 28; hl.style.transition = 'opacity 0.3s ease, transform 0.32s cubic-bezier(0.4,0,1,1)'; hl.style.opacity = '0'; hl.style.transform = `translate(${tx}px, ${ty}px) scale(0.88)`; setTimeout(() => { hl.style.transform = ''; hl.style.transition = ''; active = null;}, 340);}, 40);});
</script>
</body>
</html>
