<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>odesseu | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pathway+Gothic+One&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            color: #fff;
            font-family: 'Pathway Gothic One', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ВИДЕО ФОН - ГАРАНТИРОВАННО СНИЗУ */
        .video-bg { 
            position: fixed; 
            inset: 0; 
            z-index: 1; 
            overflow: hidden; 
        }
        .video-bg video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5;
            z-index: 2;
        }
        .video-bg::after { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.5) 100%); 
        }

        .grain { 
            position: fixed; 
            inset: 0; 
            z-index: 0; 
            pointer-events: none; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
            opacity: 0.04; 
        }

        /* ОБЩИЙ ИНТЕРФЕЙС */
        .glass { 
            background: rgba(255,255,255,0.06); 
            backdrop-filter: blur(20px) saturate(1.5); 
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ui-top-left { 
            position: fixed; 
            top: 28px; 
            left: 32px; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        /* КАРТОЧКА СТАТУСА */
        .status-card { 
            border-radius: 16px; 
            padding: 8px 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            animation: fadeDown 0.8s ease both;
        }

        .av-wrap { position: relative; width: 36px; height: 36px; }
        .av-ph { width: 100%; height: 100%; border-radius: 50%; background: #421f4a; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .s-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #111; }
        .online { background: #23a55a; }
        .offline { background: #80848e; }

        /* НАВИГАЦИЯ */
        .site-nav { 
            border-radius: 16px; 
            padding: 4px; 
            animation: fadeDown 0.8s 0.1s ease both;
        }
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: rgba(255,255,255,0.6); 
            transition: 0.2s; 
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* ЗАГОЛОВОК */
        .main-title { 
            position: fixed; 
            bottom: 30px; 
            left: 32px; 
            z-index: 100; 
            animation: fadeUp 0.8s 0.2s ease both; 
        }
        .main-title h1 { font-size: clamp(40px, 8vw, 70px); text-transform: uppercase; line-height: 0.85; }
        .main-title h1 em { font-style: normal; color: rgba(255,255,255,0.2); }

        /* КНОПКИ СОЦСЕТЕЙ - ПРИНУДИТЕЛЬНО СВЕРХУ */
        .social-nav { 
            position: fixed; 
            bottom: 30px; 
            right: 32px; 
            z-index: 100;
            display: flex; 
            gap: 12px; 
            animation: fadeUp 0.8s 0.3s ease both;
        }
        .social-btn { 
            width: 48px; 
            height: 48px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 101;
        }
        .social-btn:hover { 
            transform: translateY(-5px); 
            background: rgba(255,255,255,0.15); 
            border-color: rgba(255,255,255,0.4);
        }
        .social-btn img { 
            width: 22px; 
            height: 22px; 
            object-fit: contain; 
            transition: 0.3s;
        }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .mono { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="video-bg">
    <video id="main-bg" autoplay muted loop playsinline></video>
</div>

<div class="grain"></div>

<div class="ui-top-left">
    <!-- Статус Discord -->
    <div class="status-card glass">
        <div class="av-wrap">
            <div class="av-ph" id="av-ph">?</div>
            <img id="av-img" src="" alt="" style="display:none;position:absolute;inset:0;width:36px;height:36px;border-radius:50%">
            <div class="s-dot offline" id="s-dot"></div>
        </div>
        <div class="s-info">
            <div style="font-size:14px; font-weight:700;" id="s-name">odesseu</div>
            <div id="s-act" class="mono" style="opacity:0.4;">loading presence...</div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="site-nav glass">
        <a class="nav-item" href="https://makito.pages.dev/">
            <div class="nav-icon">M</div>
            <div>
                <div style="font-weight:600; font-size:13px">Makito</div>
                <div class="mono" style="font-size:9px; opacity:0.4">makito.pages.dev</div>
            </div>
        </a>
        <a class="nav-item" href="https://odesseu.github.io/message-sender/">
            <div class="nav-icon">S</div>
            <div>
                <div style="font-weight:600; font-size:13px">O-S Software</div>
                <div class="mono" style="font-size:9px; opacity:0.4">softworks</div>
            </div>
        </a>
    </div>
</div>

<div class="main-title">
    <h1>odesseu<em>.</em></h1>
    <div class="mono" style="opacity:0.3; letter-spacing:3px">DIGITAL ARCHITECT</div>
</div>

<div class="social-nav">
    <a href="[https://dsc.gg/s7-sw](https://dsc.gg/s7-sw)" target="_blank" class="social-btn" title="Discord">
        <img src="[https://raw.githubusercontent.com/odesseu/odesseu.github.io/master/resources/icons/discord.png](https://raw.githubusercontent.com/odesseu/odesseu.github.io/master/resources/icons/discord.png)" alt="Discord">
    </a>
    <a href="[https://t.me/murrdevs](https://t.me/murrdevs)" target="_blank" class="social-btn" title="Telegram">
        <img src="[https://raw.githubusercontent.com/odesseu/odesseu.github.io/master/resources/icons/telegram.png](https://raw.githubusercontent.com/odesseu/odesseu.github.io/master/resources/icons/telegram.png)" alt="Telegram">
    </a>
</div>

<script>
    // Видео фон
    const videos = [ 'resources/videos/bg.mp4', 'resources/videos/bg2.mp4' ];
    const videoEl = document.getElementById('main-bg');
    videoEl.src = videos[Math.floor(Math.random() * videos.length)];

    // Lanyard API
    const DISCORD_ID = '1048169367935926283'; 
    function lanyardConnect() {
        const ws = new WebSocket('wss://api.lanyard.rest/socket');
        let heartbeat;
        ws.onopen = () => ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
        ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.op === 1) heartbeat = setInterval(() => ws.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval);
            if (msg.op === 0 && (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE')) {
                const data = msg.d;
                const status = data.discord_status || 'offline';
                document.getElementById('s-dot').className = 's-dot ' + status;
                document.getElementById('s-name').textContent = data.discord_user?.global_name || 'odesseu';
                
                if (data.discord_user?.avatar) {
                    const av = document.getElementById('av-img');
                    av.src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=80`;
                    av.style.display = 'block';
                    document.getElementById('av-ph').style.display = 'none';
                }
                
                const act = data.activities?.find(a => a.type !== 4) || data.activities?.find(a => a.type === 4);
                document.getElementById('s-act').textContent = act ? (act.details || act.state || act.name) : status;
            }
        };
        ws.onclose = () => { clearInterval(heartbeat); setTimeout(lanyardConnect, 3000); };
    }
    lanyardConnect();
</script>

</body>
</html>
