<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Pathway+Gothic+One&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
 body { font-family: 'Pathway Gothic One', sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }
 .video-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000; }
 .video-bg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; transition: opacity 0.5s ease; }
 .video-bg::after { content: ''; position: absolute;  inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.5) 100%); }
 .grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; }
 .ui { position: fixed; inset: 0; z-index: 10; padding: 28px 32px; display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
 .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(28px) saturate(1.8) brightness(1.05); -webkit-backdrop-filter: blur(28px) saturate(1.8) brightness(1.05); border: 1px solid rgba(255,255,255,0.14); box-shadow: 0 8px 32px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.14); }
 .status-card { border-radius: 18px; padding: 10px 14px; display: flex; align-items: center; gap: 11px; width: fit-content; animation: fadeDown 0.6s cubic-bezier(0.16,1,0.3,1) both; }
 @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
 .av-wrap { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
 .av-ph { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #421f4a, #7a3d88); display: flex; align-items: center; justify-content: center; font-weight: 800; }
 .s-dot { position: absolute; bottom: 0; right: 0; width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(15,15,15,0.7); }
 .s-dot.online { background: #23a55a; }
 .s-dot.offline { background: #80848e; }
 .s-info { display: flex; flex-direction: column; }
 .s-name { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
 .act-txt { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.45); }
 .site-nav { border-radius: 18px; padding: 5px; position: relative; animation: fadeDown 0.65s 0.08s cubic-bezier(0.16,1,0.3,1) both; }
 .nav-item { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 13px; cursor: pointer; text-decoration: none; color: rgba(255,255,255,0.6); transition: 0.2s;  }
 .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
 .nav-icon { width: 30px; height: 30px; border-radius: 9px; background: rgba(255,255,255,0.09); display: flex; align-items: center; justify-content: center; }
 .main-title { position: fixed; bottom: 30px; left: 32px; z-index: 10; animation: fadeUp 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both; }
 .social-nav {  position: fixed; bottom: 30px; right: 32px; z-index: 10;  display: flex; gap: 10px;  animation: fadeUp 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;  }
 .social-btn { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; text-decoration: none; }
 .social-btn:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12);border-color: rgba(255,255,255,0.3); }
 .social-btn img { width: 22px; height: 22px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.8; }
 .social-btn:hover img { opacity: 1; }
 @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
 .main-title h1 {  font-family: 'Pathway Gothic One', sans-serif;  font-size: clamp(45px, 6vw, 80px);  text-transform: uppercase;  line-height: 0.9;  letter-spacing: -1px; }
 .main-title h1 em { font-style: normal; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="video-bg">
    <video id="main-bg" autoplay muted loop playsinline></video>
</div>

<div class="grain"></div>

<div class="ui">
    <div class="status-card glass">
        <div class="av-wrap">
            <div class="av-ph" id="av-ph">o</div>
            <img id="av-img" src="" alt="" style="display:none;position:absolute;inset:0;width:38px;height:38px;border-radius:50%">
            <div class="s-dot offline" id="s-dot"></div>
        </div>
        <div class="s-info">
            <div class="s-name" id="s-name">odesseu</div>
            <div id="s-act" class="act-txt">connecting...</div>
        </div>
    </div>
    <div class="site-nav glass">
        <a class="nav-item" href="https://makito.pages.dev/">
            <div class="nav-icon">M</div>
            <div class="nav-texts">
                <div style="font-weight:600; font-size:13px">Makito</div>
                <div style="font-family:'DM Mono'; font-size:10px; opacity:0.4">makito.pages.dev</div>
            </div>
        </a>
        <a class="nav-item" href="https://odesseu.github.io/softworks/">
            <div class="nav-icon">S</div>
            <div class="nav-texts">
                <div style="font-weight:600; font-size:13px">O-S Software</div>
                <div style="font-family:'DM Mono'; font-size:10px; opacity:0.4">softworks</div>
            </div>
        </a>
    </div>
</div>

<div class="main-title">
    <h1>odesseu<em>.</em></h1>
    <div style="font-family:'DM Mono'; font-size:11px; opacity:0.3; letter-spacing:3px">DIGITAL ARCHITECT</div>
</div>

<div class="social-nav">
    <a href="https://dsc.gg/s7-sw" target="_blank" class="social-btn glass" title="Discord">
        <img src="resources/icons/discord.png" alt="Discord">
    </a>
    <a href="https://t.me/murrdevs" target="_blank" class="social-btn glass" title="Telegram">
        <img src="resources/icons/telegram.png" alt="Telegram">
    </a>
</div>

<script>
    const videos = [ 'resources/videos/bg.mp4', 'resources/videos/bg2.mp4' ];
    function initBackground() {  const videoEl = document.getElementById('main-bg');  const randomVideo = videos[Math.floor(Math.random() * videos.length)];  videoEl.src = randomVideo;  }
    initBackground();

    const DISCORD_ID = '1048169367935926283'; 
    function lanyardConnect() {  const ws = new WebSocket('wss://api.lanyard.rest/socket');  let heartbeat;  ws.onopen = () => ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));  ws.onmessage = e => {  const msg = JSON.parse(e.data);  if (msg.op === 1) heartbeat = setInterval(() => ws.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval);  if (msg.op === 0 && (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE')) applyPresence(msg.d);  };  ws.onclose = () => { clearInterval(heartbeat); setTimeout(lanyardConnect, 3000); };  }
    function applyPresence(data) {  const st = data.discord_status || 'offline';  document.getElementById('s-dot').className = 's-dot ' + st;  document.getElementById('s-name').textContent = data.discord_user?.global_name || 'odesseu';  if (data.discord_user?.avatar) {  const av = document.getElementById('av-img');  av.src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=80`;  av.style.display = 'block';  document.getElementById('av-ph').style.display = 'none';  }  const act = data.activities?.find(a => a.type !== 4) || data.activities?.find(a => a.type === 4);  document.getElementById('s-act').textContent = act ? (act.details || act.state || act.name) : st;  }
    lanyardConnect();
</script>
</body>
</html>
